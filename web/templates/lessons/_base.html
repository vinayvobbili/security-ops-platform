{# Shared brand chrome for all /lessons pages — backdrop, dark mode, thick
   scrollbar, and the common mini-hero / panel / button / badge components.
   Included from each page's extra_css block. #}
<style>
  /* ---- Colorful page backdrop (light + REQUIRED dark) ---- */
  body.les-body { background:
      radial-gradient(1100px 520px at 10% -6%, #dbe7ff 0%, transparent 55%),
      radial-gradient(1000px 560px at 96% 2%, #e7dcff 0%, transparent 52%),
      radial-gradient(1200px 700px at 50% 118%, #d6f5e6 0%, transparent 55%),
      linear-gradient(160deg, #eef3ff 0%, #f4eefe 48%, #eafaf2 100%) !important;
      background-attachment: fixed !important; min-height: 100vh; }
  body.les-body.dark-mode { background:
      linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%) !important;
      color: #e2e8f0; }

  /* ---- Thick multi-color page scrollbar ---- */
  html { scrollbar-gutter: stable; }
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { border-radius: 10px;
      background: linear-gradient(180deg, rgba(78,84,200,.08), rgba(10,143,214,.10) 50%, rgba(56,239,125,.08)); }
  ::-webkit-scrollbar-thumb { border-radius: 10px; border: 2px solid transparent; background-clip: padding-box;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
      background: linear-gradient(180deg, #ffd200 0%, #fc6767 22%, #ec008c 42%, #8f94fb 62%, #0a8fd6 80%, #38ef7d 100%); }
  ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #38ef7d 0%, #0a8fd6 20%, #8f94fb 38%, #ec008c 58%, #fc6767 78%, #ffd200 100%); }
  ::-webkit-scrollbar-corner { background: transparent; }
  body.dark-mode ::-webkit-scrollbar-track {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.10) 50%, rgba(255,255,255,.06)); }

  .les-wrap { max-width: 940px; margin: 0 auto; padding: 8px 18px 70px; }

  /* ---- Back link ---- */
  .les-back { display:inline-flex; align-items:center; gap:6px; margin: 6px 0 16px; font-size:.88rem;
      font-weight:700; color:#0046ad; text-decoration:none; }
  .les-back:hover { color:#0a8fd6; }
  body.dark-mode .les-back { color:#7cb7ff; }

  /* ---- Mini hero band ---- */
  .les-mhero { position: relative; overflow: hidden; border-radius: 20px; padding: 26px 30px;
      margin: 0 0 24px; color: #fff;
      background: linear-gradient(120deg, #2a0a52 0%, #0046ad 52%, #00a651 116%);
      box-shadow: 0 18px 44px rgba(20,10,70,.34); }
  .les-mhero::before { content:""; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(700px 320px at 88% -50%, rgba(141,211,255,.40), transparent 60%),
                  radial-gradient(520px 300px at -6% 140%, rgba(70,224,138,.38), transparent 60%); }
  .les-mhero-row { position:relative; z-index:1; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .les-mhero-ic { width:54px; height:54px; flex:none; border-radius:15px; display:grid; place-items:center;
      font-size:1.7rem; background: rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.26); }
  .les-mhero h1 { margin:0; font-size:1.7rem; font-weight:800; letter-spacing:-.5px; line-height:1.15; }
  .les-mhero .sub { position:relative; z-index:1; margin:14px 0 0; color:#e2ecfb; font-size:1rem; line-height:1.55; max-width:640px; }

  /* ---- Pills / badges ---- */
  .les-pill { font-size:.7rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase;
      padding:4px 11px; border-radius:999px; color:#fff; display:inline-flex; align-items:center; gap:5px; }
  .les-pill.pass { background: linear-gradient(135deg,#11998e,#38ef7d); }
  .les-pill.tier { background: rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); }
  .les-pill.warn { background: linear-gradient(135deg,#f7971e,#ffd200); color:#5a3d00; }

  /* ---- Panel card ---- */
  .les-panel { background:#fff; border:1px solid #e6e9ef; border-radius:18px; padding:24px 26px;
      box-shadow:0 6px 18px rgba(16,24,40,.06); margin-bottom:20px; }
  body.dark-mode .les-panel { background:#161b22; border-color:#30363d; box-shadow:none; }
  .les-panel h2, .les-panel h3 { margin-top:0; }
  .les-sec-h { font-size:1.05rem; font-weight:800; color:#1a1340; margin:0 0 14px; display:flex; align-items:center; gap:9px; }
  body.dark-mode .les-sec-h { color:#e2e8f0; }

  /* ---- Buttons ---- */
  .les-btn { display:inline-flex; align-items:center; gap:8px; border:none; cursor:pointer; font-weight:700;
      font-size:.95rem; border-radius:11px; padding:11px 22px; text-decoration:none; transition:transform .14s, filter .14s, box-shadow .14s; }
  .les-btn-primary { background: linear-gradient(135deg,#0046ad,#00a651); color:#fff; box-shadow:0 8px 20px rgba(0,70,173,.28); }
  .les-btn-primary:hover { filter:brightness(1.07); transform:translateY(-2px); }
  .les-btn-ghost { background:#fff; color:#0046ad; border:1.5px solid #cdddff; }
  .les-btn-ghost:hover { background:#f4f8ff; transform:translateY(-2px); }
  body.dark-mode .les-btn-ghost { background:#1c2230; color:#7cb7ff; border-color:#324a6e; }
  .les-actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
</style>
