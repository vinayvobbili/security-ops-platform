{% macro auth_styles() %}
<style>
/* Soft brand-colored backdrop so the auth card doesn't float on a dead grey page */
body { position: relative; }
body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,70,173,0.18), transparent 55%),
        radial-gradient(circle at 80% 75%, rgba(0,166,81,0.16), transparent 60%);
}
body.dark-mode::before {
    background:
        radial-gradient(circle at 20% 20%, rgba(99,102,241,0.22), transparent 55%),
        radial-gradient(circle at 80% 75%, rgba(0,166,81,0.18), transparent 60%);
}

.auth-shell {
    position: relative; z-index: 1;
    max-width: 440px;
    margin: 56px auto;
    padding: 32px 32px 26px;
    background: var(--bg-secondary, #ffffff);
    color: var(--text-primary, #0f172a);
    border: 1px solid var(--border, rgba(15,23,42,0.10));
    border-radius: 16px;
    box-shadow: 0 18px 48px rgba(0,70,173,0.18), 0 4px 12px rgba(15,23,42,0.06);
    overflow: hidden;
}
.auth-shell::before {
    content: '';
    position: absolute; left: 0; right: 0; top: 0;
    height: 6px;
    background: linear-gradient(90deg, #0046ad 0%, #2563eb 45%, #00A651 100%);
}
body.dark-mode .auth-shell {
    background: var(--bg-secondary, #0f172a);
    color: var(--text-primary, #f1f5f9);
    border-color: rgba(148,163,184,0.18);
    box-shadow: 0 18px 48px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.35);
}

.auth-shell h1 {
    margin: 6px 0 6px;
    font-size: 26px; font-weight: 700;
    background: linear-gradient(90deg, #0046ad 0%, #00A651 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
}
.auth-shell p.lead { margin: 0 0 22px; color: var(--text-secondary, #475569); font-size: 14px; }
body.dark-mode .auth-shell p.lead { color: #94a3b8; }

.auth-shell label {
    display: block; font-size: 11px;
    color: var(--text-secondary, #64748b);
    margin: 14px 0 6px;
    text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600;
}
body.dark-mode .auth-shell label { color: #94a3b8; }

.auth-shell input[type=email], .auth-shell input[type=password], .auth-shell input[type=text], .auth-shell select, .auth-shell textarea {
    width: 100%; padding: 11px 13px; box-sizing: border-box;
    background: var(--bg-primary, #f8fafc); color: var(--text-primary, #0f172a);
    border: 1px solid rgba(15,23,42,0.14); border-radius: 8px; font-size: 14px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.auth-shell textarea {
    font-family: inherit; line-height: 1.5; min-height: 84px; resize: vertical;
}
.auth-shell input:focus, .auth-shell select:focus, .auth-shell textarea:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.18);
    background: #ffffff;
}
.auth-shell .field-hint { display: block; margin: 6px 0 0; font-size: 11px; color: var(--text-secondary, #94a3b8); letter-spacing: 0; text-transform: none; font-weight: 400; }
body.dark-mode .auth-shell .field-hint { color: #94a3b8; }
body.dark-mode .auth-shell input[type=email],
body.dark-mode .auth-shell input[type=password],
body.dark-mode .auth-shell input[type=text],
body.dark-mode .auth-shell select,
body.dark-mode .auth-shell textarea {
    background: rgba(15,23,42,0.55); color: #f1f5f9;
    border-color: rgba(148,163,184,0.25);
}
body.dark-mode .auth-shell input:focus,
body.dark-mode .auth-shell select:focus,
body.dark-mode .auth-shell textarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.30);
    background: rgba(15,23,42,0.85);
}

.auth-shell select { appearance: none; -webkit-appearance: none; padding-right: 34px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='%2364748b' d='M2 4l4 4 4-4z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center; background-size: 10px; }

.auth-shell button.primary, .auth-shell .primary {
    width: 100%; margin-top: 22px; padding: 12px 16px;
    border: 0; border-radius: 8px;
    background: linear-gradient(135deg, #0046ad 0%, #2563eb 60%, #1d4ed8 100%);
    color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 10px 22px rgba(0,70,173,0.30);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
}
.auth-shell button.primary:hover, .auth-shell .primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 28px rgba(0,70,173,0.42);
    filter: brightness(1.04);
}
.auth-shell button.primary:active { transform: translateY(0); filter: brightness(0.96); }

.auth-shell .auth-err {
    margin-top: 14px; padding: 10px 12px;
    background: rgba(220,38,38,0.10);
    border: 1px solid rgba(220,38,38,0.40);
    color: #b91c1c; border-radius: 8px; font-size: 13px;
}
body.dark-mode .auth-shell .auth-err { color: #fca5a5; background: rgba(220,38,38,0.14); }

.auth-shell .auth-ok {
    margin-top: 14px; padding: 12px 14px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.40);
    color: #047857; border-radius: 8px; font-size: 13px;
}
body.dark-mode .auth-shell .auth-ok { color: #86efac; background: rgba(16,185,129,0.14); }

.auth-shell .auth-links {
    margin-top: 22px; padding-top: 16px;
    border-top: 1px solid rgba(15,23,42,0.08);
    font-size: 13px; color: var(--text-secondary, #64748b);
    display: flex; justify-content: space-between; gap: 12px;
}
body.dark-mode .auth-shell .auth-links { border-top-color: rgba(148,163,184,0.18); color: #94a3b8; }
.auth-shell .auth-links a {
    color: #0046ad; text-decoration: none; font-weight: 600;
    transition: color 0.15s ease;
}
.auth-shell .auth-links a:hover { color: #00A651; }
body.dark-mode .auth-shell .auth-links a { color: #93c5fd; }
body.dark-mode .auth-shell .auth-links a:hover { color: #6ee7b7; }
</style>
{% endmacro %}
