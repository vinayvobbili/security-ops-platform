<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the security assistant bot Conversations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e0e0e0; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: #fff; }
  .meta { color: #888; font-size: 0.85rem; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead { position: sticky; top: 0; z-index: 1; }
  th { background: #1a1d27; color: #a0a8c0; font-weight: 600; text-align: left; padding: 10px 12px; border-bottom: 2px solid #2a2d3a; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #1e2130; vertical-align: top; }
  tr:hover td { background: #1a1d27; }
  td:nth-child(1) { white-space: nowrap; color: #7eb8f7; }
  td:nth-child(2) { max-width: 200px; color: #c8b4e8; }
  td:nth-child(3) { max-width: 500px; line-height: 1.5; }
  td:nth-child(4), td:nth-child(5) { text-align: right; white-space: nowrap; color: #888; }
  td:nth-child(6) { white-space: nowrap; color: #7eb8f7; }
  td:nth-child(7) { white-space: nowrap; color: #888; }
  .error { color: #f87171; }
</style>
</head>
<body>
<h1>the security assistant bot Conversations</h1>
<div class="meta" id="meta"></div>
<div style="overflow-x:auto;">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>
<script>
function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        if (c === '\r') i++;
      } else { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

fetch('/pokedex-log.csv')
  .then(r => r.text())
  .then(text => {
    const rows = parseCSV(text.trim());
    const headers = rows[0];
    const data = rows.slice(1);
    document.getElementById('meta').textContent = data.length + ' conversations';
    document.getElementById('thead').innerHTML = '<tr>' + headers.map(h => '<th>' + esc(h) + '</th>').join('') + '</tr>';
    document.getElementById('tbody').innerHTML = data.map(r => {
      return '<tr>' + r.map((cell, i) => {
        let cls = cell.startsWith('Error:') ? ' class="error"' : '';
        return '<td' + cls + '>' + esc(cell) + '</td>';
      }).join('') + '</tr>';
    }).join('');
  });
</script>
</body>
</html>
