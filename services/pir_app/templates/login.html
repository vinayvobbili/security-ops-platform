<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – PIR Management Platform</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--primary:#58a6ff;--primary-dark:#1f6feb;
  --danger:#f85149;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;display:flex;align-items:center;justify-content:center}
.login-box{width:360px;padding:0}
.login-header{text-align:center;margin-bottom:32px}
.login-icon{width:52px;height:52px;background:var(--primary-dark);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px}
.login-header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.login-header p{font-size:13px;color:var(--text2)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:6px;outline:none;font-size:14px;font-family:inherit}
.form-control:focus{border-color:var(--primary)}
.btn-login{width:100%;padding:10px;background:var(--primary-dark);color:#fff;border:1px solid var(--primary);border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
.btn-login:hover{background:#388bfd}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--danger);padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text2)}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <div class="login-icon">&#9679;</div>
    <h1>PIR Management</h1>
    <p>Collection Requirements Platform</p>
  </div>
  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
  <div class="login-footer">CTI Collection Management &mdash; Internal Use Only</div>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Username and password are required.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (res.ok) {
      window.location.href = '/app';
    } else {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.error || 'Invalid username or password.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (err) {
    errEl.textContent = 'Connection error. Is the server running?';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
