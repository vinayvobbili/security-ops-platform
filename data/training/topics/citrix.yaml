  - id: q29
    type: short
    difficulty: medium
    concept: reauth_eviction
    prompt: 'In one or two sentences: why doesn''t patching a CitrixBleed-vulnerable gateway end the incident,
      and what two follow-ups does our process still require?'
    hint: Name what patching does and doesn't touch — plus the two follow-ups our process still needs.
    model_answer: 'Patching stops further exploitation but does nothing to session tokens an attacker already
      stole — those stay valid until they expire or are revoked. You still have to force re-authentication
      and hunt for an existing foothold: a QRadar review of token reuse across the exposure window and a
      CrowdStrike hunt on the domain-joined VDAs/DCs.'
    rubric:
    - Patching only stops NEW exploitation
    - Already-stolen tokens remain valid until revoked/expired -> force re-auth
    - Hunt for an existing foothold (QRadar exposure-window review and/or CrowdStrike on the back-end)
  - id: q30
    type: short
    difficulty: medium
    concept: mfa_only_login
    prompt: Explain, as you would to a brand-new analyst, why MFA didn't stop a session-token-theft attack.
    hint: Think about what MFA actually protects, and what the session token becomes afterward.
    model_answer: MFA only protects the initial authentication. Once you pass it, the gateway issues a session
      token that acts as your credential for the rest of the session with no further MFA prompt — so an
      attacker who steals that token rides the already-authenticated session and never faces MFA.
    rubric:
    - MFA protects only the login / authentication step
    - A post-auth session token is issued that acts as the credential
    - Stealing the token = hijack an authenticated session, no MFA prompt
  - id: q31
    type: short
    difficulty: medium
    concept: edr_blind_adc
    prompt: Your CrowdStrike console is silent on a Citrix ADC you suspect is compromised. Why might that
      be, and what do you check instead?
    hint: Why would Falcon be silent on the ADC specifically — and which of our other tools do you turn
      to?
    model_answer: The ADC runs custom BSD where the Falcon sensor can't be installed, so CrowdStrike silence
      is expected and is not evidence the box is clean. Pivot to the ADC's own syslog in QRadar / Falcon
