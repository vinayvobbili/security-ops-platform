  - id: q40
    type: freetext
    difficulty: hard
    concept: transfer_pattern
    prompt: Describe how the same reasoning and tooling you'd apply to a Citrix ADC incident transfers to
      a brand-new critical advisory on your internet-facing VPN concentrator. What's identical, and what
      would you confirm is different?
    hint: Separate what's identical (the edge→domain playbook + our tools) from what you'd confirm is different.
    model_answer: 'Identical: it''s an internet-facing edge device that holds or brokers live sessions and
      sits one hop from the core, it''s likely an EDR blind spot (no Falcon on the appliance), patching
      won''t evict an attacker who already has tokens/access — so assume session exposure and force re-auth,
      watch its syslog in QRadar / LogScale plus Vectra east-west, block C2 at the Palo Alto firewall, capture volatile
      evidence then isolate via XSOAR, scope inward on the sensored hosts in CrowdStrike, and escalate P1
      with IR / threat hunt — minutes matter. What I''d confirm is different: the concentrator''s specific
      session/token model, exactly what it can reach inward, which logs/telemetry sources actually give
      visibility, and the vuln class (auth-bypass vs RCE vs memory-disclosure), since that shapes the exact
      detection and response.'
    rubric:
    - 'Identifies the transferable pattern: internet-facing edge device holding sessions, one hop from core,
      EDR blind spot'
    - 'Applies the same tooled playbook: QRadar/LogScale + Vectra for the box, CrowdStrike on sensored hosts,
      Palo Alto firewall block, XSOAR isolate, force re-auth, P1 escalation'
