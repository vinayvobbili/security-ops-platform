  - id: q100
    type: freetext
    difficulty: easy
    prompt: Walk me through how Citrix delivers Windows applications to users, describing which components
      are involved from an end user's perspective and what each one does during a session.
    model_answer: 'Citrix delivers Windows applications by running them on centralized VDAs (Windows servers)
