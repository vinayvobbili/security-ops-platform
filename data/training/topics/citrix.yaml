  - id: q33
    type: short
    difficulty: hard
    concept: impossible_travel
    prompt: QRadar shows a session token for one user presenting from two far-apart ASNs within minutes.
      What do you conclude, and what's your next step?
    hint: One token, two far-apart origins minutes apart — what is that, and what's the eviction step?
    model_answer: One token from two impossible-to-co-locate origins in minutes means it's being reused
      by someone other than the legitimate user — session hijack from a stolen token. Next, invalidate the
      session / force re-auth, scope what that account can reach (CrowdStrike on the back-end, QRadar auth
      trail), and treat it as part of an active incident.
    rubric:
    - Concludes session hijack / stolen-token reuse (impossible travel)
    - 'Next step: invalidate the session / force re-auth'
    - Scope account access / treat as active incident
  - id: q34
    type: short
    difficulty: medium
    concept: escalation_p1
    prompt: You've confirmed a webshell on an internet-facing Citrix ADC. Walk through how you escalate
      it in our process.
    hint: Who already holds the case? Escalation is severity + who you pull in, not opening a new ticket.
    model_answer: 'Treat it as a P1 probable perimeter breach, not an informational finding. The XSOAR case
      is already open — that''s how the CrowdStrike/QRadar detection reached you — so you escalate it, you
      don''t open another ticket: raise the severity to P1, assign/page IR and threat hunt, and notify the
      shift lead so the response is resourced immediately. In parallel, block any C2 egress at the perimeter firewall (Palo Alto) and
      kick off the containment playbook — a confirmed foothold one hop from the domain is minutes-matter,
      not a wait-and-see.'
    rubric:
    - Classifies it P1 / probable perimeter breach (not informational)
    - Escalates the EXISTING XSOAR case (raise severity) rather than 'opening a ticket'; pages IR / threat
      hunt; notifies the shift lead
    - Acts in parallel (block egress at the Palo Alto firewall / kick the containment playbook) — minutes matter
  - id: q35
    type: short
    difficulty: medium
    concept: contain_vs_evidence
    prompt: Why is capturing volatile memory a priority before you power off or rebuild a compromised edge
      appliance?
    hint: What evidence does power-off destroy for good — and what does a memory-leak bug leave in RAM?
    model_answer: Memory holds the most perishable evidence — including the session tokens a memory-disclosure
      attack leaks and traces of how the box was abused — and it's destroyed by power-off, reboot, or rebuild.
      Capture it first, then contain by network-isolating the box (via XSOAR) so you keep the evidence while
      cutting the attacker's reach.
    rubric:
    - Memory is the most volatile / perishable evidence
    - It can hold leaked tokens / attacker artifacts
    - Power-off/reboot/wipe destroys it — capture before isolating
  - id: q36
    type: short
    difficulty: medium
    concept: transfer_pattern
    prompt: Post-Mythos, name another system that should get 'Citrix-level' urgency and explain why in one
      sentence.
    hint: 'Think: internet-facing, holds live sessions, one hop from the core, and an EDR blind spot.'
    model_answer: Any internet-facing access/edge device that fronts live user sessions — for example a
      VPN concentrator or a firewall-management interface — because it's exposed, holds or brokers credentials
      and sessions, sits one hop from the internal core, and is usually an EDR blind spot you have to watch
      via syslog and NDR, so a single bug yields immediate insider access.
    rubric:
    - Names a comparable internet-facing edge/access device (VPN, firewall mgmt, gateway)
    - Cites exposure + that it holds/brokers sessions or credentials
    - Cites the short hop to the core / EDR blind spot
  - id: q37
    type: freetext
    difficulty: hard
    concept: triage_first_move
    prompt: 'You''re the analyst on shift. An internet-facing Citrix ADC is beaconing under its service
      account to an unfamiliar IP, and a new file just appeared in a web-accessible directory on the box.
      Walk through your triage in our environment: what it likely means, what you check and in which tools,
      your containment thinking, and how you escalate.'
    hint: 'Walk it end to end: what it means, what you check and in which tool, how you contain, how you
      escalate.'
    model_answer: 'This is high-signal for post-exploitation of the edge gateway — the service account shouldn''t
      initiate arbitrary outbound, and a new web-accessible file looks like a webshell (CitrixBleed / CVE-2023-3519
      class). First moves: confirm the suspicious process and its parent and inspect the new file from the
      ADC syslog in QRadar / Falcon LogScale (the ADC has no Falcon sensor, so don''t expect CrowdStrike
      on the box), and check the destination IP''s reputation in VirusTotal / Recorded Future. If it''s
      C2, block it at egress on the perimeter firewall (Palo Alto) to cut the beacon now. Scope what the ADC can reach inward — Delivery
      Controllers and Domain Controllers — using CrowdStrike on those sensored hosts and the QRadar auth
      trail; because the ADC terminates live sessions, assume tokens are exposed and plan forced re-auth.
      Containment: capture volatile memory, then network-isolate the ADC through XSOAR and CrowdStrike network-contain
      the back-end. Escalate as a P1 probable perimeter breach — the XSOAR case is already open from the
      alert, so raise its severity, page IR / threat hunt, and notify the shift lead — because minutes matter.'
    rubric:
    - Recognizes probable post-exploitation (webshell / edge RCE), not benign
    - Checks process/parent + new file in QRadar/LogScale (ADC has no Falcon); checks destination rep (VT/RF)
    - Blocks C2 egress at the Palo Alto firewall; scopes inward via CrowdStrike (VDAs/DCs) + QRadar
    - Assumes token exposure -> force re-auth; capture memory then network-isolate via XSOAR
    - 'Escalates P1 perimeter breach: raise the existing XSOAR case (not a new ticket), page IR/threat hunt,
      notify shift lead'
  - id: q38
    type: freetext
    difficulty: hard
    concept: reauth_eviction
    prompt: A CitrixBleed-class advisory drops for a gateway you operate. Leadership says 'patch it tonight
      and we're done.' Make the case for what 'done' actually requires, end to end, using the tools we have.
    hint: Argue what 'done' needs beyond the patch — token exposure, the QRadar/CrowdStrike hunt, and a
      clean assessment.
    model_answer: 'Patching tonight only stops new exploitation — it doesn''t address tokens that may already
      be stolen, so we must assume token exposure and force re-authentication / invalidate active sessions.
      We also have to hunt for a foothold that may already exist: review the ADC''s egress and session-token
      reuse across the exposure window in QRadar / Falcon LogScale, and run a CrowdStrike hunt on the domain-joined
      VDAs/DCs for service-account anomalies and lateral movement toward AD. If we find C2, block it in
      the Palo Alto firewall and contain through XSOAR. ''Done'' is patch + force re-auth + a clean compromise assessment
      across QRadar and CrowdStrike — patch alone leaves any pre-patch intruder fully in place, and MFA
      won''t help because stolen tokens bypass it.'
    rubric:
    - Patching stops new exploitation but not already-stolen tokens -> force re-auth
    - Hunt the exposure window in QRadar/LogScale (egress, token reuse)
    - CrowdStrike hunt on the VDAs/DCs for the inward pivot
    - Block C2 at the Palo Alto firewall / contain via XSOAR if found
    - Defines 'done' as patch + re-auth + clean assessment, not patch alone
  - id: q39
    type: freetext
    difficulty: hard
    concept: blast_radius_priority
    prompt: 'Two alerts are open: (a) a malware download on a single workstation, already quarantined by
