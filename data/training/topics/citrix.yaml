id: citrix
title: Citrix
tier: T1
icon: "🖥️"
mythos_priority: true

summary: >
  Citrix is an application/desktop virtualization platform that lets users access
  Windows apps and full desktops remotely from a browser or thin client. The
  flagship products are Citrix Virtual Apps and Desktops (CVAD, formerly XenApp/
  XenDesktop), the StoreFront web portal users log into, and Citrix ADC (formerly
  NetScaler) — the load balancer + remote-access gateway that fronts everything
  from the public internet.

# Short on-screen bullets for the title slide (narration reads `summary` in full).
intro_bullets:
  - "🖥️ Windows apps streamed to any device"
  - "🌐 StoreFront portal, fronted by ADC / NetScaler"
  - "🏢 The real workload lives in the datacenter"

why_risky: >
  Citrix ADC/NetScaler sits at the network edge as a gateway between the internet
  and the corporate environment, terminating VPN/ICA sessions for thousands of
  users. A single unauthenticated RCE or auth bypass on this device hands an
  attacker a foothold inside the perimeter with the privileges of any user whose
  session token is on the box. Recent history is brutal: CitrixBleed
  (CVE-2023-4966) leaked session tokens letting attackers hijack live MFA-backed
  sessions; CVE-2023-3519 was mass-exploited as zero-day for webshells; CitrixBleed 2
  (CVE-2025-5777) followed the same pattern in 2025. Once inside, attackers
  reach the Delivery Controllers and Domain Controllers because Citrix
  infrastructure is, by design, deeply integrated with Active Directory.

risk_bullets:
  - "🚪 ADC is the internet-facing front door"
  - "🎫 Live session tokens sit in its memory"
  - "💥 CitrixBleed · CVE-2023-3519 · CitrixBleed 2"
  - "🏰 One bug = a foothold inside the perimeter"

key_concepts:
  - title: "What Citrix actually does"
    icon: "🖼️"
    bullets:
      - "🖼️ App runs server-side — the device just shows pixels"
      - "📡 ICA/HDX streams the screen + your keyboard & mouse"
      - "🗄️ Data never leaves the datacenter"
    body: >
      Citrix delivers Windows applications and desktops to remote users. Instead
      of installing apps on a laptop, the app runs on a Citrix server in the
      datacenter and the user sees only screen pixels over the ICA/HDX protocol.
      That means the user's device is a viewer; the real workload — and the
      data — lives on Citrix infrastructure inside the corporate network.
  - title: "The components SOC analysts will see"
    icon: "🧩"
    bullets:
      - "🛡️ ADC / NetScaler — the edge gateway"
      - "🌐 StoreFront — the app portal"
      - "🧠 Delivery Controllers — session brokers"
      - "💻 VDAs — where the apps actually run"
    body: >
      Four pieces matter for triage. (1) Citrix ADC / NetScaler — the
      internet-facing gateway. (2) StoreFront — the web portal where users pick
      an app. (3) Delivery Controllers — the brains that broker sessions. (4)
      Virtual Delivery Agents (VDAs) — the actual Windows servers running the
      apps. Logs and alerts can come from any of these.
  - title: "Why ADC/NetScaler is the crown jewel"
    icon: "👑"
    bullets:
      - "🌍 Internet-facing, on a custom BSD OS"
      - "🎫 Terminates sessions → tokens held in memory"
      - "🔓 Compromise = hijack any user, MFA bypassed"
    body: >
      ADC is internet-facing, runs a custom BSD-based OS (not standard Linux),
      and historically has had vulnerable management interfaces exposed. It
      terminates user sessions, so it holds session tokens in memory — exactly
      what CitrixBleed exfiltrated. Compromise of ADC means session hijack
      against any logged-in user, including admins, bypassing MFA.
  - title: "The attack, end to end"
    icon: "🎯"
    bullets:
      - "🐚 Edge RCE on ADC → webshell, persistence (CVE-2023-3519)"
      - "🎫 Token leak → hijack a live session, MFA bypassed (CitrixBleed)"
      - "↔️ Pivot VDA / Delivery Controller → Active Directory"
      - "💀 Domain-wide ransomware — the recurring endgame"
    body: >
      Think of it as one kill chain, not isolated bugs. An attacker hits the
      internet-facing ADC: an unauthenticated RCE (CVE-2023-3519) drops a webshell
      for persistence, or a memory leak (CitrixBleed, CVE-2023-4966) hands them a
      live session token that walks straight past MFA. From that foothold they
      pivot inward — Citrix servers are domain-joined and run as service accounts
      with broad rights, so VDAs and Delivery Controllers become the on-ramp to
      Active Directory, and, in retro after retro, to domain-wide ransomware. That
      edge-to-domain jump is the whole danger, and it happens in minutes.
  - title: "What to watch for in detections"
    icon: "🔍"
    bullets:
      - "⚙️ Citrix service account spawning processes"
      - "📤 Unexpected outbound from the ADC"
      - "📁 New files in /var/vpn/themes or portal/scripts"
      - "🔁 Session-token reuse from new IPs"
    body: >
      Suspicious processes spawned by the Citrix services account, unexpected
      outbound connections from ADC, webshell-like files in NetScaler's
      /var/vpn/themes or /netscaler/portal/scripts, session token reuse from new
      IPs, and abnormal logons by service accounts on Delivery Controllers.
      Mass session reauth events can also indicate token theft response.
  - title: "What you do when it's live"
    icon: "🧯"
    bullets:
      - "🧪 Confirm the process & parent — is the ADC really beaconing out?"
      - "🌐 Scope inward reach: Delivery Controllers, Domain Controllers"
      - "🔑 Assume tokens are exposed — rotate secrets, force re-auth"
      - "🔌 Network-contain the ADC, preserve volatile evidence, escalate"
    body: >
      Spotting it is only half the job — the other half is moving fast. Confirm the
      suspicious process and its parent on the box and check the destination's
      reputation, then scope what the ADC can reach inward: Delivery Controllers and
      Domain Controllers. Because ADC terminates live sessions, assume session tokens
      are exposed — rotate session secrets and force re-authentication. Then contain:
      network-isolate the ADC while preserving memory and volatile data for IR, and
      escalate it as a probable perimeter breach, not a benign anomaly. With Citrix,
      minutes matter.
  - title: "Why it's prioritized for Mythos"
    icon: "🥇"
    bullets:
      - "🥇 Edge device → instant insider access with creds"
      - "📉 In every major ransomware retro of the last 3 years"
      - "⏱️ Recognize the edge→domain kill chain in minutes"
    body: >
      Citrix ADC is on the short list of edge devices that, when broken, give
      attackers immediate insider access with credentials. It is in every major
      ransomware incident retrospective from the last three years. The SOC has
      to recognize Citrix logs, understand the kill chain from edge → domain,
      and act fast — measured in minutes, not hours.

pokedex_system_prompt: >
  You are Pokedex in lesson mode, tutoring a SOC analyst on Citrix. Your goal is
  to make sure they have a high-level operational understanding of: what Citrix
  is, the four components (ADC/NetScaler, StoreFront, Delivery Controllers,
  VDAs), why ADC is the crown jewel, the common attack patterns (CitrixBleed
  CVE-2023-4966, CVE-2023-3519, CVE-2025-5777), and what to look for in
  detections.

  Teach Socratically. Ask one question at a time, wait for their answer, then
  either correct gently or build on it. Keep responses short — three sentences
  max unless they ask for depth. Do not dump the whole lesson at once. If they
  get something wrong, explain the right answer with a concrete example rather
  than just restating the fact. When they seem to have a topic down, move to
  the next one. After ~5 turns, suggest they take the quiz at
  /lessons/citrix/quiz.

questions:
  - id: q1
    prompt: "What does Citrix ADC (formerly NetScaler) primarily do in a typical enterprise deployment?"
    choices:
      - "Encrypts data at rest on database servers"
      - "Sits at the network edge as a load balancer and remote-access gateway"
      - "Runs the actual Windows applications users launch"
      - "Stores user credentials in an encrypted vault"
    answer_idx: 1
    explanation: >
      ADC is internet-facing. It load-balances and terminates remote sessions
      before traffic ever reaches internal Citrix infrastructure. That's why
      compromise of ADC is so severe — it's the front door.

  - id: q2
    prompt: "Why was CVE-2023-4966 (CitrixBleed) so dangerous even for organizations with MFA enforced?"
    choices:
      - "It allowed brute-forcing of MFA tokens at the gateway"
      - "It leaked active session tokens from ADC memory, letting attackers hijack already-authenticated sessions"
      - "It bypassed password policy on Active Directory"
      - "It disabled MFA enrollment for new users"
    answer_idx: 1
    explanation: >
      MFA only protects the login. Once a user has authenticated, the session
      token is the credential — CitrixBleed leaked those tokens directly from
      memory, so attackers could pick up where a legitimate user left off
      without ever seeing the MFA prompt.

  - id: q3
    prompt: "Which Citrix component is the public-facing web portal where users pick an app to launch?"
    choices:
      - "Delivery Controller"
      - "VDA"
      - "StoreFront"
      - "Provisioning Services"
    answer_idx: 2
    explanation: >
      StoreFront is the user-visible portal. The Delivery Controller is the
      back-end broker, and VDAs are the worker servers that actually run the
      apps.

  - id: q4
    prompt: "A SOC analyst sees an alert: a process spawned under the Citrix services account on a Delivery Controller is making outbound connections to a public IP. What does this most likely indicate?"
    choices:
      - "Normal Citrix licensing check-in"
      - "Probable post-exploitation activity — Citrix service accounts shouldn't initiate outbound connections to arbitrary IPs"
      - "Routine Windows Update traffic"
      - "Expected ICA/HDX session traffic"
    answer_idx: 1
    explanation: >
      Citrix service accounts are scoped to internal management traffic. Any
      outbound to arbitrary public IPs from a Delivery Controller is high
      signal — typical post-exploitation pattern from edge RCE pivoting deeper.

  - id: q5
    prompt: "What does ICA/HDX stand for and what is it?"
    choices:
      - "A logging format used by NetScaler"
      - "Citrix's display protocol that streams app pixels and input between server and client"
      - "An authentication module replacing RADIUS"
      - "A file-share protocol between StoreFront and VDAs"
    answer_idx: 1
    explanation: >
      ICA (Independent Computing Architecture) and its modern HDX extension are
      Citrix's screen-streaming protocol. The user's device only ever sees
      pixels and sends keyboard/mouse; the actual app runs server-side.

  - id: q6
    prompt: "Why is Citrix infrastructure tightly coupled to Active Directory, and why does that matter for incident response?"
    choices:
      - "It's optional integration that's rarely used in practice"
      - "Citrix uses AD for authN/authZ and runs domain-joined — a Citrix compromise typically pivots straight into AD"
      - "Citrix has its own user store separate from AD"
      - "AD integration only applies to StoreFront, not the rest of the stack"
    answer_idx: 1
    explanation: >
      Delivery Controllers, StoreFront, and VDAs are all domain-joined and
      authenticate users against AD. Service accounts have broad rights. So
      adversaries on Citrix infrastructure are already 'on the domain' — IR
      must assume AD blast radius from day one.

  - id: q7
    prompt: "Which of the following is the BEST description of a VDA (Virtual Delivery Agent)?"
    choices:
      - "The internet-facing load balancer"
      - "A user's local thin client"
      - "A Windows server (or session host) where published apps and desktops actually run"
      - "A licensing server"
    answer_idx: 2
    explanation: >
      VDAs are the workhorse Windows hosts. When a user opens 'Outlook' through
      Citrix, Outlook is really running on a VDA in the datacenter — the user's
      device only renders the display.

  - id: q8
    prompt: "CVE-2023-3519 was mass-exploited as zero-day in 2023. What did attackers typically do after exploiting it?"
    choices:
      - "Encrypt files on the ADC itself for ransom"
      - "Drop webshells onto the NetScaler appliance for persistence and lateral movement"
      - "Send phishing emails from compromised mailboxes"
      - "Mine cryptocurrency on the gateway"
    answer_idx: 1
    explanation: >
      CVE-2023-3519 was an unauthenticated RCE on internet-facing NetScalers.
      The dominant TTP was webshell drop into NetScaler's web directories for
      durable access, then pivot inward.

  - id: q9
    prompt: "Which filesystem paths on a NetScaler appliance would be suspicious to find new files in?"
    choices:
      - "/var/log only"
      - "/var/vpn/themes and /netscaler/portal/scripts"
      - "/etc/passwd and /etc/shadow"
      - "/tmp/.cache"
    answer_idx: 1
    explanation: >
      Web-accessible directories like /var/vpn/themes and /netscaler/portal/scripts
      were the most common webshell drop sites in the CVE-2023-3519 wave. New
      files there warrant immediate triage.

  - id: q10
    prompt: "What's the practical difference between MFA and a session token, from a SOC analyst's perspective?"
    choices:
      - "Nothing — they're two names for the same thing"
      - "MFA gates initial authentication; once the session token is issued, it IS the credential until it expires"
      - "Session tokens are stronger than MFA"
      - "MFA replaces session tokens entirely"
    answer_idx: 1
    explanation: >
      This is exactly why CitrixBleed bypassed MFA. The token issued after MFA
      can be reused from anywhere until it expires — there's no MFA prompt on
      every API call. Token theft = MFA-equivalent access.

  - id: q11
    prompt: "An ADC is running a custom BSD-based OS, not standard Linux. Why does that matter for IR?"
    choices:
      - "It means standard Linux EDR agents don't run on it, so visibility is limited to ADC's own logs and network telemetry"
      - "It's faster than Linux"
      - "It makes patching easier"
      - "It has no impact on IR"
    answer_idx: 0
    explanation: >
      Most enterprise EDR doesn't deploy onto NetScaler firmware. Detection
      relies on Citrix-emitted logs, NetFlow, and external probes — a real
      visibility gap to plan around.

  - id: q12
    prompt: "Why does mass session reauth (forcing all users to log in again) sometimes show up in IR runbooks for Citrix incidents?"
    choices:
      - "It's a placebo step that doesn't help"
      - "It invalidates leaked session tokens — the standard response to confirmed token theft"
      - "It increases logging volume"
      - "It deletes user data"
    answer_idx: 1
    explanation: >
      When tokens are known leaked (CitrixBleed scenario), patching alone isn't
      enough — existing tokens stay valid until expiry. Mass session
      invalidation is the only way to evict an attacker reusing a stolen token.

  - id: q13
    prompt: "In a typical Citrix kill chain after edge RCE, what's the most likely next step for an attacker?"
    choices:
      - "Encrypt the ADC immediately"
      - "Move from the ADC inward — to Delivery Controllers and on to Active Directory — because Citrix infra is domain-joined"
      - "Stay on the ADC indefinitely"
      - "Exfiltrate ADC logs and leave"
    answer_idx: 1
    explanation: >
      Edge RCE is just step 1. The reason Citrix sits high on the priority
      list is the short hop from ADC compromise to domain compromise via the
      domain-joined back-end servers.

  - id: q14
    prompt: "Which of these is NOT a Citrix component?"
    choices:
      - "StoreFront"
      - "NetScaler ADC"
      - "Delivery Controller"
      - "vCenter"
    answer_idx: 3
    explanation: >
      vCenter is VMware's management plane, not Citrix. (It's a separate T1
      priority though — same general 'edge management infrastructure' risk
      class.)

  - id: q15
    prompt: "Why is Citrix on Mythos's T1 priority list specifically?"
    choices:
      - "It's the most expensive product in the environment"
      - "It's an internet-facing edge gateway whose compromise leads directly to insider access with credentials, and it has a track record of mass-exploited vulns"
      - "It's the newest platform deployed"
      - "It has the most CPU usage"
    answer_idx: 1
    explanation: >
      T1 = highest-impact-to-SOC-mission-readiness. Citrix's combination of
      'exposed to the internet', 'one bug = inside the perimeter', and 'attackers
      love it' is why it leads the list.

  - id: q16
    prompt: "What's CitrixBleed 2 (CVE-2025-5777)?"
    choices:
      - "A patch that fixed the original CitrixBleed"
      - "A 2025 memory-disclosure vulnerability following the same pattern as the original — leaking sensitive data from ADC memory"
      - "A new Citrix product launch"
      - "A vendor advisory unrelated to a real CVE"
    answer_idx: 1
    explanation: >
      CVE-2025-5777 demonstrated that the same class of memory-disclosure bug
      keeps coming back. Treat any new ADC advisory as potentially
      session-token-impacting until proven otherwise.

  - id: q17
    type: short
    prompt: "In one or two sentences: why does MFA not protect against an exploit like CitrixBleed?"
    model_answer: >
      MFA only protects the initial login. CitrixBleed leaks the session token
      that is issued AFTER authentication, so an attacker who steals that token
      hijacks an already-authenticated session and never has to face the MFA
      prompt.
    rubric:
      - "MFA only protects the login / authentication step"
      - "The leaked artifact is a post-auth session token"
      - "Stolen token = hijack an already-authenticated session, bypassing MFA"

  - id: q18
    type: freetext
    prompt: >
      You're the SOC analyst on shift. An alert fires: a process running under the
      Citrix service account on an internet-facing ADC/NetScaler is making outbound
      connections to an unfamiliar public IP. Walk through how you'd triage this —
      what it likely means, what you'd check first, and your initial containment
      thinking.
    model_answer: >
      This pattern is high-signal for post-exploitation of the edge gateway —
      ADC service accounts shouldn't be initiating arbitrary outbound traffic.
      Treat it as a probable webshell / RCE foothold (CitrixBleed / CVE-2023-3519
      class). First moves: confirm the process and parent on the box, pull the
      destination IP's reputation, and scope what the ADC can reach inward
      (Delivery Controllers, Domain Controllers). Because ADC terminates live
      sessions, assume session tokens may be exposed — pivot to whether any
      authenticated sessions or accounts were abused. Containment thinking:
      isolate/network-contain the ADC, preserve memory/volatile data for IR,
      rotate session secrets, and force re-auth; escalate as a likely perimeter
      breach rather than a benign anomaly.
    rubric:
      - "Recognizes it as likely post-exploitation, not benign (service accounts shouldn't beacon outbound)"
      - "Ties it to known edge-RCE / CitrixBleed-class compromise of ADC"
      - "Checks process/parent, destination reputation, and inward blast radius (DCs, Delivery Controllers)"
      - "Notes session-token exposure risk and the need to rotate secrets / force re-auth"
      - "Proposes containment (isolate the ADC, preserve evidence) and escalation"

  # --- fill-in-the-blank (deterministic grade against accepted_answers) ---
  - id: q19
    type: fill_blank
    difficulty: easy
    prompt: >
      Citrix's display protocol — the one that streams application pixels to the
      user's device while the app runs server-side — is abbreviated ______.
    accepted_answers:
      - "ICA"
      - "HDX"
      - "ICA/HDX"
      - "HDX/ICA"
      - "Independent Computing Architecture"
    explanation: >
      ICA (Independent Computing Architecture), and its modern HDX extension, is
      Citrix's screen-streaming protocol. The endpoint only ever sees pixels and
      sends keyboard/mouse input.

  - id: q20
    type: fill_blank
    difficulty: medium
    prompt: >
      The 2023 vulnerability that leaked active session tokens directly from
      Citrix ADC memory — letting attackers hijack already-authenticated
      sessions despite MFA — is known by the nickname ______.
    accepted_answers:
      - "CitrixBleed"
      - "Citrix Bleed"
      - "CVE-2023-4966"
    explanation: >
      CitrixBleed (CVE-2023-4966) leaked post-authentication session tokens from
      ADC memory, so MFA — which only guards the login — gave no protection once
      a session existed.

  # --- match-the-following (deterministic; partial credit per correct pair) ---
  - id: q21
    type: match
    difficulty: medium
    prompt: "Match each Citrix component to what it actually does."
    pairs:
      - left: "StoreFront"
        right: "Public-facing portal where users pick an app to launch"
      - left: "Delivery Controller"
        right: "Back-end broker that brokers sessions to worker hosts"
      - left: "VDA"
        right: "Windows host where the published app actually runs"
      - left: "ADC / NetScaler"
        right: "Internet-facing load balancer and remote-access gateway"
    explanation: >
      StoreFront is the user-visible portal, the Delivery Controller is the
      broker, VDAs are the worker hosts that run the apps, and ADC/NetScaler is
      the edge gateway — the crown-jewel front door.

  - id: q22
    type: match
    difficulty: hard
    prompt: "Match each Citrix CVE / artifact to its hallmark."
    pairs:
      - left: "CVE-2023-4966 (CitrixBleed)"
        right: "Leaks post-auth session tokens from ADC memory"
      - left: "CVE-2023-3519"
        right: "Unauthenticated RCE on internet-facing NetScaler"
      - left: "/netscaler/portal/scripts"
        right: "Common webshell drop path to triage on the appliance"
      - left: "Domain-joined Delivery Controller"
        right: "Compromise pivots straight into Active Directory"
    explanation: >
      CitrixBleed is the token-leak; CVE-2023-3519 is the unauth RCE; web-
      accessible NetScaler paths are the classic webshell drop sites; and because
      Citrix infra is domain-joined, a foothold there means AD blast radius.

  - id: q23
    type: mc
    difficulty: easy
    prompt: Which Citrix component is responsible for brokering user sessions between StoreFront and the
      VDAs?
    choices:
    - Delivery Controllers
    - ADC / NetScaler
    - StoreFront
    - Virtual Delivery Agent (VDA)
    answer_idx: 0
    explanation: Delivery Controllers are the brains that broker sessions between StoreFront and the VDAs,
      as outlined in the lesson.
  - id: q24
    type: mc
    difficulty: medium
    prompt: An attacker exploits Citrix ADC with CVE-2023-4966 (CitrixBleed). What is their most immediate
      opportunity after exploitation?
    choices:
    - Exfiltrate in-memory session tokens and hijack live user sessions (including admins, bypassing MFA)
    - Steal user passwords stored on the ADC
    - Gain direct access to Active Directory domain controllers
    - Overwrite application binaries on VDAs
    answer_idx: 0
    explanation: CVE-2023-4966 (CitrixBleed) leaks session tokens from the ADC, allowing attackers to hijack
      live sessions and bypass MFA.
  - id: q25
    type: mc
    difficulty: medium
    prompt: During triage of a Citrix incident, you observe suspicious files appearing in /var/vpn/themes
      and /netscaler/portal/scripts on ADC. What does this MOST likely indicate?
    choices:
    - A webshell or attacker persistence artifact has been deployed on ADC
    - A legitimate software update process is running
    - User configuration files are being updated
    - Routine backup operations are occurring
    answer_idx: 0
    explanation: The lesson specifies these paths as common locations for webshell drops after edge RCE,
      indicating attacker persistence.
  - id: q26
    type: mc
    difficulty: medium
    prompt: Why is Citrix infrastructure particularly vulnerable to lateral movement after initial compromise
      of ADC?
    choices:
    - Citrix servers are domain-joined and run as service accounts with broad rights
    - ADC is exposed to the internet but does not touch the internal network
    - Citrix uses a proprietary protocol that cannot be understood by attackers
    - Session tokens cannot be reused across components
    answer_idx: 0
    explanation: Because Citrix servers are deeply integrated with Active Directory and run with broad service
      account privileges, attackers often move laterally to domain controllers after edge compromise.
  - id: q27
    type: mc
    difficulty: medium
    prompt: As a SOC analyst, you detect session token reuse from a new IP address immediately after a Citrix
      ADC exploit. What does this strongly suggest?
    choices:
    - An attacker has hijacked a user session by exfiltrating session tokens
    - A legitimate user is accessing their session from a new location
    - Citrix servers are misconfigured
    - A software patch is rolling out
    answer_idx: 0
    explanation: Session token reuse from new IPs points to an adversary leveraging leaked tokens, a known
      post-exploitation behavior from CitrixBleed.
  - id: q28
    type: mc
    difficulty: hard
    prompt: Which immediate containment action should a SOC analyst prioritize after detecting CitrixBleed-style
      session token theft?
    choices:
    - Forcing mass session reauthentication for all users
    - Shutting down all VDAs
    - Upgrading StoreFront to the latest version
    - Rebooting domain controllers
    answer_idx: 0
    explanation: Mass session reauth invalidates stolen session tokens and is a standard response to CitrixBleed-style
      session hijack.
  - id: q29
    type: mc
    difficulty: hard
    prompt: An attacker pivots from a compromised VDA to Active Directory. What is the most likely reason
      this succeeds in Citrix environments?
    choices:
    - VDAs are domain-joined and their service accounts typically have broad rights
    - VDAs operate independently from all network resources
    - Active Directory authentication is weak by default
    - VDAs run Linux, which is easier to exploit
    answer_idx: 0
    explanation: The lesson explains that VDAs are domain-joined, with broad service account privileges,
      facilitating attacker lateral movement toward domain controllers.
  - id: q30
    type: mc
    difficulty: easy
    prompt: What is the primary architectural reason Windows app data never leaves the datacenter in Citrix
      Virtual Apps and Desktops?
    choices:
    - Applications run entirely server-side and users interact via ICA/HDX pixel streaming
    - All user sessions are encrypted with SSL
    - StoreFront portal encrypts downloads
    - User devices are prohibited from saving files
    answer_idx: 0
    explanation: Citrix delivers application pixels over ICA/HDX, running workloads server-side so data
      remains inside the datacenter.
  - id: q31
    type: mc
    difficulty: medium
    prompt: A SOC analyst observes a sudden spike in outbound connections originating from the Citrix ADC
      towards unusual external IPs shortly after a suspected vulnerability exploitation. What is the MOST
      immediate concern?
    choices:
    - ADC is attempting automatic software updates.
    - A legitimate user is accessing internet resources through their session.
    - ADC might be exfiltrating data or reaching a command-and-control server post-compromise.
    - StoreFront server is being overloaded, causing error messages.
    answer_idx: 2
    explanation: Unusual outbound connections from ADC are a strong indicator of post-exploitation activity,
      such as data exfiltration or establishing C2 channels.
  - id: q32
