      on the domain-joined VDAs/DCs that DO carry the sensor.
    rubric:
    - ADC is a no-Falcon / custom-OS blind spot — silence is not cleanliness
    - Pivot to ADC syslog in QRadar / LogScale (and Vectra east-west)
    - Use CrowdStrike on the sensored VDAs/DCs
  - id: q32
    type: short
    difficulty: medium
    concept: edge_to_domain
    prompt: Why does a confirmed foothold on an internet-facing gateway justify scoping Active Directory
