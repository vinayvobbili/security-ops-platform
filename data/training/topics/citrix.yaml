    - 'Confirms what''s DIFFERENT: session model, inward reachability, telemetry sources, vuln class'
  - id: q41
    type: mc
    difficulty: medium
    concept: perimeter_block
    prompt: A datacenter Citrix ADC is beaconing to a C2 host and you want to cut that channel fast. Where
      do you block the egress in OUR environment?
    choices:
    - In the corporate proxy — it fronts all of our outbound traffic
    - At the perimeter firewall (Palo Alto), and sinkhole the C2 domain at Infoblox DNS — the corporate proxy only covers
      workstation egress, mostly when they're off the corporate network, so it doesn't sit in front of a
      datacenter appliance like the ADC
    - Nowhere at the network layer — only a forced token re-auth matters
    - On the ADC's own host firewall, by SSHing into the appliance
    answer_idx: 1
    explanation: The corporate proxy is the egress path for workstations (and mostly when they're off-network); it isn't
      inline for a datacenter appliance like the ADC. Cut the C2 at the Palo Alto perimeter firewall and,
      for a domain-based handler, sinkhole it at Infoblox DNS. Re-auth is essential too, but it evicts the
      stolen token — it doesn't cut the live C2 channel, so you do both.
