id: citrix
title: Citrix
tier: T1
icon: "🖥️"
mythos_priority: true

summary: >
  Citrix is an application/desktop virtualization platform that lets users access
  Windows apps and full desktops remotely from a browser or thin client. The
  flagship products are Citrix Virtual Apps and Desktops (CVAD, formerly XenApp/
  XenDesktop), the StoreFront web portal users log into, and Citrix ADC (formerly
  NetScaler) — the load balancer + remote-access gateway that fronts everything
  from the public internet.

# Short on-screen bullets for the title slide (narration reads `summary` in full).
intro_bullets:
  - "🖥️ Windows apps streamed to any device"
  - "🌐 StoreFront portal, fronted by ADC / NetScaler"
  - "🏢 The real workload lives in the datacenter"

why_risky: >
  Citrix ADC/NetScaler sits at the network edge as a gateway between the internet
  and the corporate environment, terminating VPN/ICA sessions for thousands of
  users. A single unauthenticated RCE or auth bypass on this device hands an
  attacker a foothold inside the perimeter with the privileges of any user whose
  session token is on the box. Recent history is brutal: CitrixBleed
  (CVE-2023-4966) leaked session tokens letting attackers hijack live MFA-backed
  sessions; CVE-2023-3519 was mass-exploited as zero-day for webshells; CitrixBleed 2
  (CVE-2025-5777) followed the same pattern in 2025. Once inside, attackers
  reach the Delivery Controllers and Domain Controllers because Citrix
  infrastructure is, by design, deeply integrated with Active Directory.

risk_bullets:
  - "🚪 ADC is the internet-facing front door"
  - "🎫 Live session tokens sit in its memory"
  - "💥 CitrixBleed · CVE-2023-3519 · CitrixBleed 2"
  - "🏰 One bug = a foothold inside the perimeter"

key_concepts:
  - title: "What Citrix actually does"
    icon: "🖼️"
    bullets:
      - "🖼️ App runs server-side — the device just shows pixels"
      - "📡 ICA/HDX streams the screen + your keyboard & mouse"
      - "🗄️ Data never leaves the datacenter"
    body: >
      Citrix delivers Windows applications and desktops to remote users. Instead
      of installing apps on a laptop, the app runs on a Citrix server in the
      datacenter and the user sees only screen pixels over the ICA/HDX protocol.
      That means the user's device is a viewer; the real workload — and the
      data — resides on Citrix infrastructure inside the corporate network.
  - title: "The components SOC analysts will see"
    icon: "🧩"
    bullets:
      - "🛡️ ADC / NetScaler — the edge gateway"
      - "🌐 StoreFront — the app portal"
      - "🧠 Delivery Controllers — session brokers"
      - "💻 VDAs — where the apps actually run"
    body: >
      Four pieces matter for triage. (1) Citrix ADC / NetScaler — the
      internet-facing gateway. (2) StoreFront — the web portal where users pick
      an app. (3) Delivery Controllers — the brains that broker sessions. (4)
      Virtual Delivery Agents (VDAs) — the actual Windows servers running the
      apps. Logs and alerts can come from any of these.
  - title: "Why ADC/NetScaler is the crown jewel"
    icon: "👑"
    bullets:
      - "🌍 Internet-facing, on a custom BSD OS"
      - "🎫 Terminates sessions → tokens held in memory"
      - "🔓 Compromise = hijack any user, MFA bypassed"
    body: >
      ADC is internet-facing, runs a custom BSD-based OS (not standard Linux),
      and historically has had vulnerable management interfaces exposed. It
      terminates user sessions, so it holds session tokens in memory — exactly
      what CitrixBleed exfiltrated. Compromise of ADC means session hijack
      against any logged-in user, including admins, bypassing MFA.
  - title: "The attack, end to end"
    icon: "🎯"
    bullets:
      - "🐚 Edge RCE on ADC → webshell, persistence (CVE-2023-3519)"
      - "🎫 Token leak → hijack a live session, MFA bypassed (CitrixBleed)"
      - "↔️ Pivot VDA / Delivery Controller → Active Directory"
      - "💀 Domain-wide ransomware — the recurring endgame"
    body: >
      Think of it as one kill chain, not isolated bugs. An attacker hits the
      internet-facing ADC: an unauthenticated RCE (CVE-2023-3519) drops a webshell
      for persistence, or a memory leak (CitrixBleed, CVE-2023-4966) hands them a
      live session token that walks straight past MFA. From that foothold they
      pivot inward — Citrix servers are domain-joined and run as service accounts
      with broad rights, so VDAs and Delivery Controllers become the on-ramp to
      Active Directory, and, in retro after retro, to domain-wide ransomware. That
      edge-to-domain jump is the whole danger, and it happens in minutes.
  - title: "What to watch for — and where it shows up"
    icon: "🔍"
    bullets:
      - "⚙️ Service-account process spawns on VDAs/DCs → CrowdStrike"
      - "📤 Unexpected outbound from the ADC → QRadar / LogScale syslog"
      - "📁 New files in /var/vpn/themes or portal/scripts → LogScale"
      - "🔁 Session-token reuse from new ASNs → QRadar"
    body: >
      Each signal sits in a specific tool on your desk. Suspicious processes
      spawned by the Citrix service account and abnormal service-account logons on
      Delivery Controllers show up in CrowdStrike — because the VDAs and DCs are
      domain-joined Windows boxes that DO run the Falcon sensor. The ADC itself
      does not (custom BSD, no sensor), so its unexpected outbound connections,
      webshell-like files in /var/vpn/themes or /netscaler/portal/scripts, and
      session-token reuse from new ASNs come from the appliance's own syslog in
      QRadar / Falcon LogScale, plus Vectra for east-west the EDR can't see. Mass
      session-reauth events in QRadar can also indicate a token-theft response.
  - title: "What you do when it's live"
    icon: "🧯"
    bullets:
      - "🧪 Confirm the process & parent — check the egress IP's rep (VT/RF)"
      - "🚫 Block the C2 destination at the perimeter firewall (Palo Alto)"
      - "🌐 Scope inward reach in CrowdStrike/QRadar: VDAs, Delivery & Domain Controllers"
      - "🔑 Assume tokens exposed — force re-auth; preserve memory, escalate P1"
    body: >
      Spotting it is only half the job — the other half is moving fast, with the
      right tool at each step. Confirm the suspicious process and its parent and
      check the destination's reputation (VirusTotal / Recorded Future); if it's
      C2, block that destination at the Palo Alto perimeter firewall to cut the
      beacon now — and sinkhole the domain at Infoblox DNS. (The corporate proxy is
      workstation/off-network egress, not the lever for a datacenter appliance like
      the ADC.) Scope
      what the ADC can reach inward — Delivery Controllers and Domain Controllers —
      using CrowdStrike on those sensored hosts and QRadar for the auth trail.
      Because ADC terminates live sessions, assume session tokens are exposed and
      force re-authentication (a firewall block does NOT kill a live token — only
      re-auth does). Then contain through XSOAR: network-isolate the ADC while
      preserving memory and volatile data for IR, CrowdStrike network-contain the
      back-end VDAs/DCs, and raise it as a P1 probable perimeter breach — the XSOAR
      case is already open from the alert, so escalate it, page IR / threat hunt,
      notify the shift lead. With Citrix, minutes matter.
  - title: "Working it in our stack"
    icon: "🧰"
    bullets:
      - "🛰️ ADC = no Falcon sensor → CrowdStrike the VDAs/DCs instead"
      - "🔎 ADC syslog + session reuse → QRadar / Falcon LogScale; Vectra east-west"
      - "🚫 Block C2 at the Palo Alto firewall · isolate + ticket via XSOAR"
      - "🆘 Escalate P1 perimeter breach → page IR / threat hunt, tell the shift lead"
    body: >
      Map the playbook to the tools you actually have. The ADC/NetScaler runs
      custom BSD with no CrowdStrike sensor, so don't wait on Falcon for the
      gateway — pivot CrowdStrike to the domain-joined VDAs and Delivery
      Controllers (those ARE sensored) for service-account process spawns and
      lateral movement, and lean on Vectra/NDR for the east-west traffic EDR
      can't see. Pull the ADC's own syslog, webshell file writes, and session-token
      reuse from new ASNs in QRadar / Falcon LogScale; AD-lookup the Citrix service
      account and trace the hijacked session in QRadar's Entra/identity data. Block
      the C2 destination at the Palo Alto perimeter firewall (not the corporate proxy, which only
      covers workstation/off-network egress), then contain through XSOAR —
      network-isolate the ADC (network-layer, since there's no sensor to "contain")
      and CrowdStrike network-contain the sensored back-end. Force session re-auth
      to kill stolen tokens, and escalate as a P1 probable perimeter breach. XSOAR
      is the orchestration layer that already raised this case from the
      CrowdStrike/QRadar signal — so you escalate the existing case (raise it to
      P1), you don't open a second ticket; page IR / threat hunt and notify the
      shift lead. The gateway can't be EDR-contained, so the speed comes from
      knowing which tool owns which step.
  - title: "Why it's prioritized for Mythos"
    icon: "🥇"
    bullets:
      - "🥇 Edge device → instant insider access with creds"
      - "📉 In every major ransomware retro of the last 3 years"
      - "⏱️ Recognize the edge→domain kill chain in minutes"
    body: >
      Citrix ADC is on the short list of edge devices that, when broken, give
      attackers immediate insider access with credentials. It is in every major
      ransomware incident retrospective from the last three years. The SOC has
      to recognize Citrix logs, understand the kill chain from edge → domain,
      and act fast — measured in minutes, not hours.

pokedex_system_prompt: >
  You are Pokedex in lesson mode, tutoring a SOC analyst on Citrix. Your goal is
  to make sure they have a high-level operational understanding of: what Citrix
  is, the four components (ADC/NetScaler, StoreFront, Delivery Controllers,
  VDAs), why ADC is the crown jewel, the common attack patterns (CitrixBleed
  CVE-2023-4966, CVE-2023-3519, CVE-2025-5777), what to look for in detections,
  and — most importantly — how they'd actually work it in our environment: the
  ADC has no CrowdStrike sensor so they pivot Falcon to the domain-joined
  VDAs/DCs and use Vectra for east-west; ADC syslog and session-token reuse come
  from QRadar / Falcon LogScale; they block C2 at the Palo Alto perimeter firewall
  (the corporate proxy is workstation/off-network egress, not for the datacenter ADC), contain and
  ticket through XSOAR, force session re-auth to kill stolen tokens, and escalate
  a confirmed foothold as a P1 perimeter breach (page IR / threat hunt, notify
  the shift lead).

  Teach Socratically. Ask one question at a time, wait for their answer, then
  either correct gently or build on it. Keep responses short — three sentences
  max unless they ask for depth. Do not dump the whole lesson at once. If they
  get something wrong, explain the right answer with a concrete example rather
  than just restating the fact. When they seem to have a topic down, move to
  the next one. After ~5 turns, suggest they take the quiz at
  /lessons/citrix/quiz.

questions:

  - id: q1
    type: mc
    difficulty: medium
    concept: triage_first_move
    prompt: An internet-facing Citrix ADC/NetScaler starts beaconing outbound under its service account,
      hours after a vendor advisory for a new memory-disclosure bug — and no patch exists yet. What's the
      BEST first move?
    choices:
    - Wait for the vendor patch and apply it at the next maintenance window
    - 'Treat it as a probable perimeter breach: confirm the process and parent in the ADC syslog (QRadar/LogScale),
      block the outbound IP at the perimeter firewall (Palo Alto) to cut the beacon, scope inward reach, and escalate the case in XSOAR
      — assuming tokens are already exposed'
    - Reboot the appliance to clear the suspicious process
    - Reset every domain user's password immediately
    answer_idx: 1
    explanation: 'Edge appliances shouldn''t beacon out. With no patch you can''t fix your way out — you
      triage and contain: pull the ADC''s own logs (it has no Falcon sensor), block the C2 at the Palo Alto firewall now,
      and escalate the case in XSOAR (the SOAR that already raised this from the CrowdStrike/QRadar signal),
      assuming the live tokens the box holds are already in play. Rebooting destroys volatile evidence;
      a mass password reset doesn''t touch stolen session tokens.'
  - id: q2
    type: mc
    difficulty: medium
    concept: reauth_eviction
    prompt: You patched a Citrix ADC for CitrixBleed at 2:00 PM. At 4:00 PM QRadar flags a session token
      tied to a VP's account replayed from a new ASN. What does this most likely tell you?
    choices:
    - The patch failed and must be reapplied
    - It's a false positive — a patched box can't be exploited
    - The patch closed the hole but did not invalidate tokens stolen before 2:00 PM; you're still in an
      active incident and need to force re-auth
    - The VP is travelling and logging in from a new location
    answer_idx: 2
    explanation: Patching stops NEW exploitation; it does nothing to tokens already exfiltrated. Stolen
      post-auth tokens stay valid until they expire or you force re-auth. QRadar showing replay from a new
      ASN right after patching is the classic tell that you patched but didn't evict.
  - id: q3
    type: mc
    difficulty: medium
    concept: mfa_only_login
    prompt: Leadership asks how attackers got in 'when we have MFA everywhere.' Which explanation is correct
      for a CitrixBleed-class incident?
    choices:
    - The attackers brute-forced the MFA one-time codes
    - MFA was misconfigured and silently disabled on the gateway
    - MFA only gates the initial login; the attack stole the post-authentication session token, which is
      the credential after MFA and carries no further prompt
    - MFA doesn't apply to administrator accounts
    answer_idx: 2
    explanation: The single most important transferable lesson. MFA protects the authentication event. Once
      a session token is issued it IS the credential until expiry — there's no MFA challenge on every request.
      Token theft equals MFA-equivalent access.
  - id: q4
    type: mc
    difficulty: medium
    concept: edr_blind_adc
    prompt: Your CrowdStrike console shows nothing on a Citrix ADC you suspect is compromised. What's the
      right read, and where do you pivot?
    choices:
    - Falcon is broken — reinstall the sensor on the ADC
    - The ADC runs custom BSD with no Falcon sensor, so silence is expected and is NOT proof it's clean;
      pivot to the ADC's syslog in QRadar/LogScale, Vectra for east-west, and CrowdStrike on the sensored
      VDAs/DCs
    - Falcon is silent because the box is clean
    - ADC traffic is encrypted, so Falcon simply can't see it
    answer_idx: 1
    explanation: The gateway is an EDR blind spot — Falcon was never on it. 'Falcon is clean' means 'Falcon
      is blind,' not 'the box is safe.' Detection leans on the ADC's own syslog (QRadar/LogScale), Vectra
      east-west, and CrowdStrike on the domain-joined VDAs/DCs that DO carry the sensor.
  - id: q5
    type: mc
    difficulty: medium
    concept: blast_radius_priority
    prompt: Four alerts hit your queue at the same instant. Which do you work FIRST?
    choices:
    - A phishing email reported by a user in HR
    - A possible webshell file written to a web-accessible directory on an internet-facing Citrix gateway
    - A blocked malware download on a workstation, already quarantined by CrowdStrike
    - An expired-certificate warning on the internal wiki
    answer_idx: 1
    explanation: An edge gateway is the front door to the whole environment, and a webshell there means
      a likely active foothold with minutes-matter pivot risk. The CrowdStrike-quarantined malware is already
      contained; the low-severity items can wait. Prioritize by blast radius and reversibility, not alert
      order.
  - id: q6
    type: mc
    difficulty: medium
    concept: edge_to_domain
    prompt: Why does a foothold on Citrix back-end infrastructure (Delivery Controllers, VDAs) effectively
      mean 'assume Active Directory blast radius'?
    choices:
    - Because those servers store a copy of AD's password database
    - Because they're domain-joined and run as service accounts with broad rights, so a foothold there is
      already 'on the domain' — and CrowdStrike/QRadar should immediately scope what those accounts touched
    - Because Active Directory has no security boundaries
    - Because Citrix replaces Active Directory for authentication
    answer_idx: 1
    explanation: The danger is the short hop. Citrix infra is domain-joined by design and its service accounts
      are privileged, so edge->back-end->AD is a few steps. Scope AD impact from hour one — those VDAs/DCs
      are sensored, so CrowdStrike and the QRadar auth trail are where you do it.
  - id: q7
    type: mc
    difficulty: medium
    concept: service_account_anomaly
    prompt: CrowdStrike shows the Citrix service account spawning a process on a Delivery Controller. What
      MOST distinguishes routine activity from post-exploitation?
    choices:
    - The time of day the process ran
    - The process making outbound connections to an unfamiliar public IP, and/or a logon from a non-corporate
      IP — service accounts are scoped to internal management traffic
    - Whether the process name contains the word 'citrix'
    - The CPU usage of the process
    answer_idx: 1
    explanation: A service account has a narrow, predictable job. The discriminator is behavior that breaks
      that envelope — arbitrary outbound, odd source IPs, unexpected child processes in the CrowdStrike
      process tree — not the clock or a name string.
  - id: q8
    type: mc
    difficulty: medium
    concept: contain_vs_evidence
    prompt: You're about to contain a compromised ADC. Which approach best balances stopping the attacker
      against preserving the investigation?
    choices:
    - Power the appliance off immediately
    - Block its C2 egress at the perimeter firewall (Palo Alto), then network-isolate the box via XSOAR while preserving memory and
      volatile data, and escalate it as a perimeter breach
    - Leave it fully online and just watch, so you don't tip off the attacker
    - Wipe and rebuild it right away to restore service
    answer_idx: 1
    explanation: Powering off or wiping destroys volatile evidence (including the very memory CitrixBleed
      abuses); leaving it online lets the attacker keep pivoting. Cutting C2 at the Palo Alto firewall and network-isolating
      through XSOAR stops reach while keeping the box's state for IR.
  - id: q9
    type: mc
    difficulty: medium
    concept: reauth_eviction
    prompt: An analyst patches a CitrixBleed-vulnerable ADC and closes the ticket as 'remediated.' What
      did they miss?
    choices:
    - Nothing — patching is full remediation
    - They also needed to reboot StoreFront
    - Patching doesn't invalidate already-leaked tokens or hunt for an existing foothold; they still owe
      a forced re-auth, a QRadar review of token reuse across the exposure window, and a CrowdStrike hunt
      on the back-end
    - They should have upgraded the VDAs first
    answer_idx: 2
    explanation: '''Patched'' and ''not compromised'' are different claims. For a token-leak bug, remediation
      means patch + force re-auth + hunt for persistence already dropped (QRadar exposure-window review,
      CrowdStrike on the VDAs/DCs). Closing on the patch alone is how dwell time happens.'
  - id: q10
    type: mc
    difficulty: hard
    concept: impossible_travel
    prompt: Which observation would MOST increase your confidence that an attacker is actively reusing a
      stolen Citrix session token (rather than a benign user)?
    choices:
    - A successful session from the user's usual corporate IP during business hours
    - QRadar shows the same session token presenting from two distant ASNs within minutes of each other
    - A single failed login on StoreFront
    - High memory usage on the ADC
    answer_idx: 1
    explanation: One token, two impossible-to-co-locate origins in a short window means the token is being
      used by someone other than its owner — impossible travel in QRadar. Single failed logins and resource
      metrics aren't session-hijack signals.
  - id: q11
    type: mc
    difficulty: medium
    concept: edge_to_domain
    prompt: You've confirmed a foothold on an internet-facing Citrix gateway. What should you scope FIRST?
    choices:
    - The marketing website's uptime
    - What the gateway can reach inward — Delivery Controllers and Domain Controllers (via CrowdStrike +
      the QRadar auth trail) — and which authenticated sessions or accounts may be exposed
    - The licensing server's renewal date
    - End-user laptop patch levels
    answer_idx: 1
    explanation: The whole risk of an edge device is the pivot inward. Scope reachability toward your identity
      tier (DCs) and the sessions/tokens the box held — CrowdStrike on the sensored back-end and QRadar's
      auth data are where that scoping happens.
  - id: q12
    type: mc
    difficulty: hard
    concept: kill_chain_sequence
    prompt: 'You observe, in sequence: a new file in a web-accessible directory on the ADC (LogScale), then
      an outbound connection from the ADC (QRadar), then a service-account logon on a Delivery Controller
      from an odd source (CrowdStrike). Which reading fits best?'
    choices:
    - Three unrelated false positives
    - Edge RCE -> webshell persistence -> outbound C2/handler -> lateral movement toward the domain
    - Routine patch, backup, and licensing check-in
    - A user customizing their portal theme
    answer_idx: 1
    explanation: Read signals as a chain across your tools, not in isolation. Drop-on-edge (LogScale), then
      beacon (QRadar), then inward service-account logon (CrowdStrike) is the textbook edge->domain progression
      — that compound pattern should escalate fast.
  - id: q13
    type: mc
    difficulty: medium
    concept: transfer_pattern
    prompt: The Citrix material is a worked example. Which OTHER situation should trigger the SAME reasoning
      and urgency?
    choices:
    - A user forgetting their password
    - An internet-facing VPN concentrator or firewall-management interface with a fresh unauth-RCE advisory
      and unexplained outbound traffic in QRadar
    - A printer offline on the third floor
    - A spam email sitting in someone's junk folder
    answer_idx: 1
    explanation: 'Post-Mythos the point isn''t Citrix specifically — it''s the pattern: an internet-facing
      access/edge device with a critical bug, holding live sessions, one hop from the core, and usually
      an EDR blind spot you watch via syslog/NDR. VPNs, firewall management planes, and gateways all earn
      the same urgency.'
  - id: q14
    type: mc
    difficulty: medium
    concept: minutes_matter
    prompt: Why is 'respond in minutes, not hours' emphasized for edge-gateway compromise specifically?
    choices:
    - Because the appliance's logs are deleted hourly
    - Because compromise yields immediate insider access with valid credentials/tokens, and the hop to Delivery
      Controllers and AD is short
    - Because the change-management SLA requires it
    - Because the gateway reboots itself every hour
    answer_idx: 1
    explanation: The speed pressure comes from the short edge->domain distance and the fact that you begin
      the incident already 'inside' with usable credentials. Dwell time converts directly into lateral movement.
  - id: q15
    type: mc
    difficulty: hard
    concept: reauth_eviction
    prompt: You've confirmed token theft from an ADC and the attacker is reusing a stolen token right now.
      You've already blocked the C2 IP at the perimeter firewall (Palo Alto) and CrowdStrike-contained the VDAs. Which action actually
      EVICTS the attacker's stolen token?
    choices:
    - Patching the ADC
    - Forcing session re-authentication / invalidating active sessions so the stolen token stops working
    - Rebooting the Domain Controllers
    - The firewall block already handled it
    answer_idx: 1
    explanation: Blocking C2 at the Palo Alto firewall cuts one channel and CrowdStrike-containing the back-end limits
      the blast radius, but neither revokes the token — it's still valid against the gateway. Only forced
      re-auth / session invalidation makes the stolen token useless immediately.
  - id: q16
    type: mc
    difficulty: medium
    concept: contain_vs_evidence
    prompt: Before you isolate a compromised ADC, what's the single most important thing to preserve, and
      why?
    choices:
    - The appliance's serial number, for the asset record
    - Volatile memory — it can contain leaked session tokens, attacker artifacts, and the evidence of how
      the box was abused
    - The portal's banner image
    - The uptime counter
    answer_idx: 1
    explanation: For a memory-disclosure class of attack, RAM is the crime scene. Capture volatile state
      before any action (power-off, reboot, wipe) that destroys it — then network-isolate via XSOAR.
  - id: q17
    type: mc
    difficulty: medium
    concept: escalation_p1
    prompt: You've confirmed a webshell on an internet-facing Citrix ADC. What's the correct escalation
      in our process?
    choices:
    - Email the Citrix admin to take a look when they get in
    - 'Raise it as a P1 probable perimeter breach: escalate the existing XSOAR case, page IR / threat hunt,
      and notify the shift lead'
    - Close it as informational — the webshell hasn't done anything yet
    - Wait for the nightly report to flag it
    answer_idx: 1
    explanation: 'A webshell on an internet-facing gateway is a likely active foothold one hop from the
      domain. It''s a P1: the XSOAR case is already open from the alert, so escalate it — raise the severity,
      pull in IR / threat hunt, and tell the shift lead. Minutes matter, and a confirmed foothold is never
      ''informational.'''
  - id: q18
    type: fill_blank
    difficulty: medium
    concept: reauth_eviction
    prompt: Patching a Citrix gateway stops new exploitation but does not invalidate tokens already stolen
      — which is why, after a CitrixBleed-class incident, analysts must force ______ to evict an attacker
      reusing a live session.
    accepted_answers:
    - re-authentication
    - reauthentication
    - re-auth
    - reauth
    - session re-auth
    explanation: Patching is not eviction. Forced re-authentication / session invalidation is what makes
      already-stolen tokens useless.
  - id: q19
    type: fill_blank
    difficulty: medium
    concept: mfa_only_login
    prompt: MFA protects only the ______ event; once a session token is issued it becomes the credential,
      which is why stealing that token bypasses MFA entirely.
    accepted_answers:
    - login
    - log in
    - authentication
    - sign-in
    - sign in
    explanation: MFA gates the front-door authentication. After that, the token carries access with no further
      prompt — so token theft sidesteps MFA.
  - id: q20
    type: fill_blank
    difficulty: medium
    concept: edr_blind_adc
    prompt: Because the ADC runs a custom OS that the CrowdStrike sensor can't be installed on, detection
      of the gateway itself leans on its own ______ shipped to QRadar / Falcon LogScale, plus Vectra network
      telemetry.
    accepted_answers:
    - syslog
    - logs
    - log
    - system logs
    explanation: No Falcon on the appliance means you rely on what it emits — its syslog in QRadar/LogScale
      — plus surrounding NDR (Vectra).
  - id: q21
    type: fill_blank
    difficulty: hard
    concept: impossible_travel
    prompt: A single session token presenting in QRadar from two distant ASNs within minutes is best explained
      not by a travelling user but by session ______ — an attacker reusing a stolen token.
    accepted_answers:
    - hijacking
    - hijack
    - theft
    - replay
    - reuse
    explanation: Impossible-travel on one token equals hijack/replay, not legitimate use.
